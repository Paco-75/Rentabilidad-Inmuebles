<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rentabilidad">
  <meta name="description" content="Calculadora de rentabilidad de inmuebles">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Rentabilidad Inmuebles</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --border: #e0e0e0;
      --border2: #ebebeb;
      --text: #111111;
      --text2: #666666;
      --green: #0F6E56;
      --amber: #BA7517;
      --red: #A32D2D;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding-bottom: 2rem;
    }
    header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.25rem 0.75rem;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .container { padding: 0 1.25rem; max-width: 600px; margin: 0 auto; }
    .section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text2);
      margin: 1.5rem 0 0.6rem;
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 380px) { .grid2 { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--text2); }
    .field-row {
      display: flex; align-items: center;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .field-row input {
      border: none; background: transparent;
      padding: 10px 10px; font-size: 15px;
      font-family: var(--font); color: var(--text);
      width: 100%; outline: none;
    }
    .field-row .unit {
      padding: 10px 10px 10px 0;
      font-size: 13px; color: var(--text2); white-space: nowrap;
    }
    .field-combo { display: flex; gap: 8px; align-items: stretch; }
    .field-combo .field-row { flex: 1; }
    .iva-toggle {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 0 10px;
      cursor: pointer; white-space: nowrap;
      font-size: 12px; color: var(--text2); user-select: none;
    }
    .iva-toggle input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
    .divider { border: none; border-top: 0.5px solid var(--border2); margin: 1.5rem 0; }

    /* Results */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-top: 0.5rem;
    }
    .metric {
      background: var(--bg2);
      border-radius: var(--radius); padding: 0.9rem;
    }
    .metric .mlabel { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .metric .mval { font-size: 22px; font-weight: 600; }
    .metric.good .mval { color: var(--green); }
    .metric.warn .mval { color: var(--amber); }
    .metric.bad .mval { color: var(--red); }
    .metric.neutral .mval { color: var(--text); }
    .metric .msub { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Breakdown */
    .breakdown {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; margin-top: 0.75rem;
    }
    .bsection { padding: 0.7rem 1rem; }
    .bsection + .bsection { border-top: 0.5px solid var(--border); }
    .bsection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .bsection-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); }
    .bsection-total { font-size: 14px; font-weight: 600; color: var(--text); }
    .brow { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .brow .blabel { color: var(--text2); padding-left: 8px; }
    .brow .bval { color: var(--text2); }
    .btotal-row {
      border-top: 0.5px solid var(--border);
      padding: 0.8rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .btotal-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .btotal-amounts { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .btotal-anual { font-size: 15px; font-weight: 600; color: var(--text); }
    .btotal-mensual { font-size: 12px; color: var(--text2); }
  </style>
</head>
<body>
  <header>
    <h1>Rentabilidad Inmuebles</h1>
    <p>Calculadora de inversión al contado</p>
  </header>

  <div class="container">

    <p class="section-title">Precio y costes de adquisición</p>
    <div class="grid2">
      <div class="field"><label>Precio del inmueble</label><div class="field-row"><input type="number" inputmode="decimal" id="precio" value="100000" oninput="calc()"><span class="unit">€</span></div></div>
      <div class="field"><label>Gastos de compra (ITP/AJD + notaría)</label><div class="field-row"><input type="number" inputmode="decimal" id="gastos_pct" value="10" step="0.5" oninput="calc()"><span class="unit">%</span></div></div>
      <div class="field">
        <label>Comisión agencia inmobiliaria</label>
        <div class="field-combo">
          <div class="field-row"><input type="number" inputmode="decimal" id="comision_pct" value="3" step="0.5" oninput="calc()"><span class="unit">%</span></div>
          <label class="iva-toggle"><input type="checkbox" id="iva_comision" onchange="calc()"> +IVA</label>
        </div>
      </div>
      <div class="field"><label>Reformas y adaptación</label><div class="field-row"><input type="number" inputmode="decimal" id="reforma" value="0" oninput="calc()"><span class="unit">€</span></div></div>
      <div class="field"><label>Muebles y equipamiento</label><div class="field-row"><input type="number" inputmode="decimal" id="muebles" value="0" oninput="calc()"><span class="unit">€</span></div></div>
    </div>

    <p class="section-title">Ingresos por alquiler</p>
    <div class="grid2">
      <div class="field"><label>Renta mensual</label><div class="field-row"><input type="number" inputmode="decimal" id="renta" value="850" oninput="calc()"><span class="unit">€/mes</span></div></div>
    </div>

    <p class="section-title">Gastos anuales</p>
    <div class="grid2">
      <div class="field"><label>IBI</label><div class="field-row"><input type="number" inputmode="decimal" id="ibi" value="200" oninput="calc()"><span class="unit">€/año</span></div></div>
      <div class="field"><label>Comunidad de propietarios</label><div class="field-row"><input type="number" inputmode="decimal" id="comunidad" value="70" oninput="calc()"><span class="unit">€/mes</span></div></div>
      <div class="field"><label>Tasa de basuras</label><div class="field-row"><input type="number" inputmode="decimal" id="basuras" value="120" oninput="calc()"><span class="unit">€/año</span></div></div>
      <div class="field"><label>Seguro de hogar</label><div class="field-row"><input type="number" inputmode="decimal" id="seguro" value="200" oninput="calc()"><span class="unit">€/año</span></div></div>
      <div class="field">
        <label>Seguro de impago</label>
        <div class="field-combo">
          <div class="field-row"><input type="number" inputmode="decimal" id="seguro_impago_pct" value="3.5" step="0.1" oninput="calc()"><span class="unit">% renta</span></div>
          <label class="iva-toggle"><input type="checkbox" id="iva_impago" onchange="calc()"> +IVA</label>
        </div>
      </div>
      <div class="field"><label>Mantenimiento y reparaciones</label><div class="field-row"><input type="number" inputmode="decimal" id="mantenimiento" value="0" oninput="calc()"><span class="unit">€/año</span></div></div>
    </div>

    <div class="divider"></div>

    <div class="results-grid" id="results"></div>

    <p class="section-title" style="margin-top:1.25rem">Desglose anual</p>
    <div class="breakdown" id="breakdown"></div>

  </div>

  <script>
    const IVA = 0.21;
    function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
    function chk(id) { return document.getElementById(id).checked; }
    function fmt(n) { return Math.round(n).toLocaleString('es-ES') + ' €'; }
    function fmtPct(n) { return n.toFixed(2) + '%'; }

    function calc() {
      const precio = v('precio');
      const gastosCompra = precio * v('gastos_pct') / 100;
      const comision = precio * v('comision_pct') / 100 * (chk('iva_comision') ? (1 + IVA) : 1);
      const reforma = v('reforma');
      const muebles = v('muebles');
      const renta = v('renta');
      const ibi = v('ibi');
      const comunidad = v('comunidad') * 12;
      const basuras = v('basuras');
      const seguro = v('seguro');
      const seguroImpago = renta * 12 * v('seguro_impago_pct') / 100 * (chk('iva_impago') ? (1 + IVA) : 1);
      const mant = v('mantenimiento');

      const inversionTotal = precio + gastosCompra + comision + reforma + muebles;
      const ingresosAnuales = renta * 12;
      const totalGastos = ibi + comunidad + basuras + seguro + mant;
      const gastosAnuales = totalGastos + seguroImpago;
      const flujoNeto = ingresosAnuales - gastosAnuales;

      const rentaBruta = precio > 0 ? ingresosAnuales / precio * 100 : 0;
      const rentaNeta = inversionTotal > 0 ? flujoNeto / inversionTotal * 100 : 0;
      const payback = flujoNeto > 0 ? inversionTotal / flujoNeto : 0;
      const col = r => r >= 5 ? 'good' : r >= 3 ? 'warn' : 'bad';
      const ivaImpLabel = chk('iva_impago') ? ' + IVA' : '';

      document.getElementById('results').innerHTML = `
        <div class="metric ${col(rentaBruta)}">
          <div class="mlabel">Rentabilidad bruta</div>
          <div class="mval">${fmtPct(rentaBruta)}</div>
          <div class="msub">Ingresos / precio</div>
        </div>
        <div class="metric ${col(rentaNeta)}">
          <div class="mlabel">Rentabilidad neta</div>
          <div class="mval">${fmtPct(rentaNeta)}</div>
          <div class="msub">Tras gastos, sin impuestos</div>
        </div>
        <div class="metric neutral">
          <div class="mlabel">Flujo neto anual</div>
          <div class="mval">${fmt(flujoNeto)}</div>
          <div class="msub">${fmt(Math.round(flujoNeto/12))} / mes</div>
        </div>
        <div class="metric neutral">
          <div class="mlabel">Payback</div>
          <div class="mval">${flujoNeto > 0 ? Math.round(payback) + ' años' : '—'}</div>
          <div class="msub">Recuperación inversión</div>
        </div>
      `;

      document.getElementById('breakdown').innerHTML = `
        <div class="bsection">
          <div class="bsection-header">
            <span class="bsection-label">Ingresos por alquiler</span>
            <span class="bsection-total">+ ${fmt(ingresosAnuales)}</span>
          </div>
          <div class="brow"><span class="blabel">Renta mensual × 12</span><span class="bval">${fmt(renta)} × 12</span></div>
        </div>
        <div class="bsection">
          <div class="bsection-header">
            <span class="bsection-label">Gastos</span>
            <span class="bsection-total">− ${fmt(totalGastos)}</span>
          </div>
          <div class="brow"><span class="blabel">IBI</span><span class="bval">− ${fmt(ibi)}</span></div>
          <div class="brow"><span class="blabel">Comunidad (${v('comunidad')} €/mes)</span><span class="bval">− ${fmt(comunidad)}</span></div>
          <div class="brow"><span class="blabel">Tasa de basuras</span><span class="bval">− ${fmt(basuras)}</span></div>
          <div class="brow"><span class="blabel">Seguro de hogar</span><span class="bval">− ${fmt(seguro)}</span></div>
          <div class="brow"><span class="blabel">Mantenimiento</span><span class="bval">− ${fmt(mant)}</span></div>
        </div>
        <div class="bsection">
          <div class="bsection-header">
            <span class="bsection-label">Seguro de impago</span>
            <span class="bsection-total">− ${fmt(seguroImpago)}</span>
          </div>
          <div class="brow"><span class="blabel">${v('seguro_impago_pct').toFixed(1)}% sobre renta anual${ivaImpLabel}</span><span class="bval">− ${fmt(seguroImpago)}</span></div>
        </div>
        <div class="btotal-row">
          <span class="btotal-label">Flujo neto</span>
          <div class="btotal-amounts">
            <span class="btotal-anual">${fmt(flujoNeto)} / año</span>
            <span class="btotal-mensual">${fmt(Math.round(flujoNeto/12))} / mes</span>
          </div>
        </div>
      `;
    }

    calc();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
